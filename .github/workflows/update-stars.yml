name: Update Star Counts

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:        # manual trigger button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Refresh star counts & regenerate README
        run: python scripts/update_stars.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/repos.json
          git diff --cached --quiet \
            || git commit -m "🔄 Auto-update star counts [$(date -u +%Y-%m-%d)]"
          git push
